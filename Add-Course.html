<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Personal-Course-Organizer.css">
        <title>Personal Course Organizer</title>
    </head>
    <body>
        <title>Personal Course Organizer</title>
        <header>
            <p class="left">📚Personal Course Organizer</p>
            <nav class="right">
                <a href="index.html" class="Home-page">Home</a>
                <a href="My-Course.html" class="My-Course">My Course</a>
                <a href="Add-Course.html" class="">Add Course</a>
                <a href="Contact-Us.html" class="Contact-Us">Contact Us</a>
            </nav>
        </header>

        <section>
            <form>
                <div class="mock-pg">
                    <div class="hdr">
                        <span>📝 Add Course</span>
                    </div>
                    <div class="form-area">
                        <h2>Add a New Course</h2>
                            <div class="field">
                                <label for="course-name">Course Name</label>
                                <input type="text" id="course-name" placeholder="course name">
                            </div>
                    
                            <div class="field">
                                <label for="instructor">Instructor</label>
                                <input type="text" id="instructor" placeholder="instructor name">
                            </div>
                    
                            <div class="field">
                                <label for="credit-hours">Credit Hours</label>
                                <input type="number" id="credit-hours" placeholder="hours number">
                            </div>
                    
                            <div class="field">
                                <label for="notes">Notes</label>
                                <input id="notes" placeholder="Any notes"></input>
                            </div>
                    
                            <button class="submit-btn">Submit Course</button>
                    </div>
                </div>
            </form>
        </section>
        
        <footer class="ending">
            <p>This page made for educational porpuses, no copyrights in it.</p>
        </footer>
    </body>
</html>
